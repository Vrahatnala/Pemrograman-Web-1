<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPhotography</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #333;
        }

        .font-serif {
            font-family: 'Times New Roman', Times, serif;
        }

        .navbar {
            padding: 20px 0;
            background-color: #fff;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: normal;
            color: #000;
        }

        .navbar-brand b {
            font-weight: 900;
        }

        .navbar-nav .nav-link {
            font-family: 'Times New Roman', Times, serif;
            color: #6c757d;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            margin: 0 10px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .navbar-nav .nav-link:hover {
            color: #000;
        }

        .hero {
            text-align: center;
            padding: 60px 0;
        }

        .hero h2 {
            font-weight: 900;
            margin-bottom: 10px;
        }

        .hero h3 {
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .hero p {
            font-size: 0.75rem;
            color: #6c757d;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .filter-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .filter-btn {
            font-family: 'Times New Roman', Times, serif;
            border: 1px solid #dee2e6;
            background-color: transparent;
            color: #6c757d;
            font-weight: 600;
            padding: 5px 20px;
            margin: 0 5px;
            border-radius: 50px;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .filter-btn:hover {
            color: #000;
            border-color: #000;
        }

        .filter-btn.active {
            border-color: #000;
            color: #000;
        }

        .gallery {
            max-width: 1000px;
            margin: 0 auto;
        }

        .gallery img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .footer {
            text-align: center;
            padding: 50px 0;
        }

        .footer h4 {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .footer p {
            color: #6c757d;
            font-size: 0.75rem;
        }

        .social-icons {
            margin-top: 15px;
        }

        .social-icons a {
            color: #6c757d;
            font-size: 1rem;
            margin: 0 8px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .social-icons a:hover {
            color: #000;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container" style="max-width: 1000px;">
            <a class="navbar-brand font-serif" href="#"><b>JPhotography</b></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About Me</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Portfolio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <h2 class="font-serif">Hii. Hello.. I Am Fatih...!</h2>
            <h3 class="font-serif">I Travel Around Kutub Selatan To Get The Best Photos.!</h3>
            <p>Award Winning Photographer / Cinematographer / Writer</p>
        </div>
    </section>

    <section class="filter-section">
        <div class="container">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="landscape">Landscape</button>
            <button class="filter-btn" data-filter="portrait">Portrait</button>
            <button class="filter-btn" data-filter="product">Product</button>
        </div>
    </section>

    <section class="gallery">
        <div class="container" style="max-width: 1000px;">
            <div class="row g-1">
                <div class="col-6 col-md-3 item landscape"><img src="Gambar/30-Antarctique_SnowHill_Manchots_Empereurs©StudioPONANT-Morgane-Monneret-1-774x774.jpg" alt="Gallery"></div>
                <div class="col-6 col-md-3 item portrait"><img src="Gambar/30627f237982b80399f5d2db0c8daeeea38a5950.jpeg" alt="Gallery"></div>
                <div class="col-6 col-md-3 item product"><img src="Gambar/30627f237982b80399f5d2db0c8daeeea38a5950.jpg" alt="Gallery"></div>
                <div class="col-6 col-md-3 item landscape"><img src="Gambar/453801468.0.0.1421786380.webp" alt="Gallery"></div>
                
                <div class="col-6 col-md-3 item portrait"><img src="Gambar/Cape-penguins-Boulders-Beach-Cape-Town-South-Africa.webp" alt="Gallery"></div>
                <div class="col-6 col-md-3 item product"><img src="Gambar/Hope_Bay-2016-Trinity_Peninsula–Adélie_penguin_(Pygoscelis_adeliae)_04.jpg" alt="Gallery"></div>
                <div class="col-6 col-md-3 item landscape"><img src="Gambar/Kaiserpinguine_Kueken_MWenger.jpg" alt="Gallery"></div>
                <div class="col-6 col-md-3 item portrait"><img src="Gambar/King Penguins with Greg Mortimer, South Georgia, Tyson Mayr-2.jpg" alt="Gallery"></div>
                
                <div class="col-6 col-md-3 item product"><img src="Gambar/Susan-McConnell-Penguin-3.jpg" alt="Gallery"></div>
                <div class="col-6 col-md-3 item landscape"><img src="Gambar/_WW1446916 (1).jpg" alt="Gallery"></div>
                <div class="col-6 col-md-3 item portrait"><img src="Gambar/happy-penguin-day-why-these-fluffy-friends-need-our-help-968917.webp" alt="Gallery"></div>
                <div class="col-6 col-md-3 item product"><img src="Gambar/happy-penguin2.jpg" alt="Gallery"></div>
                
                <div class="col-6 col-md-3 item landscape"><img src="Gambar/images.jpg" alt="Gallery"></div>
                <div class="col-6 col-md-3 item portrait"><img src="Gambar/king-penguins-walking-down-beach-south-georgia-piet-van-dem-bemd-secret-atlas.jpg" alt="Gallery"></div>
                <div class="col-6 col-md-3 item product"><img src="Gambar/penquin-1-gty-er-220115_1642267676711_hpMain.jpg" alt="Gallery"></div>
                <div class="col-6 col-md-3 item landscape"><img src="Gambar/rs14963_2008-09-05-079.600x514.jpg" alt="Gallery"></div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <h4 class="font-serif"><b>JPhotography</b></h4>
            <p>&copy; Copyrights 2019 All Rights Reserved</p>
            <div class="social-icons">
                <a href="#"><i class="fa-solid fa-basketball"></i></a>
                <a href="#"><i class="fa-brands fa-behance"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $(document).ready(function() {
            $(".filter-btn").click(function() {
                const filter = $(this).data("filter");

                $(".filter-btn").removeClass("active");
                $(this).addClass("active");

                if (filter === "all") {
                    $(".gallery .item").show();
                } else {
                    $(".gallery .item").hide();
                    $(".gallery ." + filter).show();
                }
            });
        });
    </script>
</body>
</html>
